name: دانلودر زیرنویس یوتیوب

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: 'YouTube video URL'
        required: true
        type: string

      upload_method:
        description: '📤 روش ذخیره نهایی'
        required: true
        type: choice
        options:
          - repository (push to repo)
          - release (GitHub Releases)
        default: 'repository (push to repo)'

      release_tag:
        description: '🏷️ نام تگ ریلیز (فقط در صورت انتخاب Release)'
        required: false
        type: string
        default: ''

permissions:
  contents: write

jobs:
  fetch-subtitles:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📂 Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🔧 Install Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y zip curl python3 python3-pip
          pip3 install --quiet youtube-transcript-api requests

      - name: 🎬 Download Subtitles (English & Persian)
        id: download
        run: |
          python3 << 'EOF'
          import os, sys, re, json
          from youtube_transcript_api import YouTubeTranscriptApi
          from youtube_transcript_api.formatters import SRTFormatter

          URL = os.environ.get('INPUT_URL')

          # Extract video ID from URL
          def extract_video_id(url):
              patterns = [
                  r'(?:v=|\/)([0-9A-Za-z_-]{11})(?:[?&]|$)',
                  r'(?:youtu\.be\/)([0-9A-Za-z_-]{11})',
                  r'(?:embed\/)([0-9A-Za-z_-]{11})'
              ]
              for pattern in patterns:
                  match = re.search(pattern, url)
                  if match:
                      return match.group(1)
              return None

          video_id = extract_video_id(URL)
          if not video_id:
              print("::error::Could not extract video ID from URL")
              sys.exit(1)

          print(f"📹 Video ID: {video_id}")
          print(f"🎬 Downloading subtitles in English (en) and Persian (fa)")

          # Get video info to fetch title
          try:
              import requests
              info_url = f"https://noembed.com/embed?url=https://www.youtube.com/watch?v={video_id}"
              resp = requests.get(info_url, timeout=10)
              if resp.status_code == 200:
                  data = resp.json()
                  video_title = data.get('title', video_id)
              else:
                  video_title = video_id
          except:
              video_title = video_id

          # Clean video title for filename
          safe_title = re.sub(r'[^\w\s\-_\(\)\[\]]', '_', video_title)
          safe_title = re.sub(r'\s+', ' ', safe_title).strip()
          safe_title = safe_title[:50]  # Limit length

          print(f"📝 Video title: {safe_title}")

          # Create downloads directory
          os.makedirs("downloads", exist_ok=True)

          # Language mapping
          languages = {
              'en': 'English',
              'fa': 'Persian'
          }

          srt_formatter = SRTFormatter()

          # Try to get transcripts
          downloaded = False
          
          for lang_code, lang_name in languages.items():
              try:
                  print(f"🔄 Trying to download {lang_name} ({lang_code}) subtitles...")
                  
                  # Get transcript list
                  transcript_list = YouTubeTranscriptApi.list_transcripts(video_id)
                  
                  transcript = None
                  
                  # Try to find exact language match
                  try:
                      transcript = transcript_list.find_transcript([lang_code])
                  except:
                      # If Persian not found, try to find and translate
                      if lang_code == 'fa':
                          print(f"   ⚠️ Persian not found, trying to translate from English...")
                          try:
                              eng_transcript = transcript_list.find_transcript(['en'])
                              transcript = eng_transcript.translate('fa')
                              print(f"   ✅ Persian subtitle generated by translation from English")
                          except:
                              print(f"   ❌ Could not translate to Persian")
                              continue
                      else:
                          print(f"   ❌ {lang_name} not found")
                          continue
                  
                  # Fetch the transcript
                  transcript_data = transcript.fetch()
                  
                  # Format as SRT
                  srt_content = srt_formatter.format_transcript(transcript_data)
                  
                  # Save to file
                  filename = f"downloads/{safe_title}_{lang_code}.srt"
                  with open(filename, 'w', encoding='utf-8') as f:
                      f.write(srt_content)
                  
                  # Count lines
                  line_count = len(transcript_data)
                  print(f"   ✅ Downloaded {lang_name} subtitle - {line_count} lines")
                  print(f"   📁 Saved to: {filename}")
                  downloaded = True
                  
              except Exception as e:
                  print(f"   ❌ Error downloading {lang_name}: {str(e)}")
                  continue

          if not downloaded:
              print("::error::No subtitles were downloaded!")
              print("Possible reasons:")
              print("  - Video has no subtitles")
              print("  - English and Persian subtitles are not available")
              print("  - YouTube API is rate limited")
              sys.exit(1)

          # Save video info
          info_file = "downloads/video_info.json"
          with open(info_file, 'w', encoding='utf-8') as f:
              json.dump({
                  'video_id': video_id,
                  'video_title': video_title,
                  'video_url': URL,
                  'download_date': os.popen('date').read().strip()
              }, f, indent=2, ensure_ascii=False)
          
          print(f"\n✅ Download completed!")
          print(f"📁 Files saved in 'downloads' folder")

          EOF
        env:
          INPUT_URL: ${{ github.event.inputs.video_url }}

      - name: 📋 Verify Subtitle Files
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ زیرنویس‌های دانلود شده با فرمت SRT:"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          if [ -d "downloads" ] && [ "$(ls -A downloads/*.srt 2>/dev/null)" ]; then
            ls -lh downloads/
            
            for file in downloads/*.srt; do
              if [ -f "$file" ]; then
                echo ""
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                echo "📄 فایل: $(basename "$file")"
                echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
                echo "📝 10 خط اول فایل:"
                echo "────────────────────────────────────────"
                head -15 "$file"
                echo "────────────────────────────────────────"
                echo "📊 حجم فایل: $(du -h "$file" | cut -f1)"
              fi
            done
          else
            echo "❌ هیچ زیرنویسی دانلود نشد!"
            exit 1
          fi
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✨ همه فایل‌ها در پوشه 'downloads' ذخیره شدند"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: 📅 Get Current Date
        id: get_date
        run: echo "date=$(date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      - name: 📤 Push to Repository
        if: github.event.inputs.upload_method == 'repository (push to repo)'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add downloads/
          git commit -m "🎬 دانلود زیرنویس یوتیوب (انگلیسی و فارسی) با تایم‌استمپ [skip ci]" || echo "Nothing to commit"
          git push
          echo "✅ فایل‌ها به ریپازیتوری در پوشه 'downloads' اضافه شدند"

      - name: 📤 Upload to GitHub Releases
        if: github.event.inputs.upload_method == 'release (GitHub Releases)'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag != '' && github.event.inputs.release_tag || format('subtitles-{0}', github.run_number) }}
          name: ${{ format('زیرنویس YouTube - {0}', github.run_number) }}
          body: |
            ## 🎬 زیرنویس‌های دانلود شده از YouTube
            
            **🔗 لینک ویدیو:** ${{ github.event.inputs.video_url }}
            
            **📝 جزئیات:**
            - **زبان‌ها:** انگلیسی (en) و فارسی (fa)
            - **فرمت:** SRT با تایم‌استمپ کامل
            - **تاریخ دانلود:** ${{ steps.get_date.outputs.date }}
            
            **📁 محتویات:**
            - فایل‌های SRT با زمان‌بندی دقیق
            - هر زیرنویس شامل تایم‌استمپ شروع و پایان
            - آماده برای استفاده در پلیرهای مختلف
            
            ---
            ⚡ با استفاده از GitHub Actions
            
            💡 **نکته:** فایل‌ها در پوشه `downloads` قرار دارند
          files: downloads/*
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false

      - name: 🧹 Cleanup
        if: always() && github.event.inputs.upload_method == 'release (GitHub Releases)'
        run: rm -rf downloads 2>/dev/null || true
